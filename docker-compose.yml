version: '3.8'

# ==========================================
# BEARS WEEK 2026 - DOCKER COMPOSE
# Ecosistema completo: Laravel 12 + n8n + PostgreSQL + Redis
# ==========================================

networks:
  frontend_net:
    driver: bridge
    name: bweek_frontend
  backend_ai_net:
    driver: bridge
    name: bweek_backend

volumes:
  postgres_data:
    name: bweek_postgres_data
  redis_data:
    name: bweek_redis_data
  n8n_data:
    name: bweek_n8n_data

services:
  # ==========================================
  # POSTGRESQL 16 + pgvector
  # Base de datos principal compartida
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: bweek_postgres
    restart: unless-stopped
    networks:
      - backend_ai_net
    environment:
      POSTGRES_USER: ${DB_USERNAME:-bweek_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_secure_password}
      POSTGRES_MULTIPLE_DATABASES: ecommerce_db,n8n_db,ai_memory_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/backups:/backups
    #    ports:
    #      - "127.0.0.1:5432:5432"  # Solo accesible localmente
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-bweek_admin}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres -c shared_buffers=256MB -c effective_cache_size=1GB -c max_connections=200 -c random_page_cost=1.1 -c effective_io_concurrency=200 -c work_mem=4MB -c maintenance_work_mem=64MB -c checkpoint_completion_target=0.9 -c wal_buffers=16MB -c default_statistics_target=100

  # ==========================================
  # REDIS 7
  # Caché, sesiones, colas y rate limiting
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: bweek_redis
    restart: unless-stopped
    networks:
      - backend_ai_net
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    #    ports:
    #      - "127.0.0.1:6379:6379"  # Solo accesible localmente
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==========================================
  # LARAVEL 12 (PHP 8.4)
  # Core Ecommerce + API
  # ==========================================
  laravel:
    build:
      context: ./laravel
      dockerfile: Dockerfile
      args:
        - PHP_VERSION=8.4
    container_name: bweek_laravel
    restart: unless-stopped
    networks:
      - frontend_net
      - backend_ai_net
    env_file:
      - .env
    volumes:
      - ./laravel:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - "./WEBSITE GENERAL INFO:/var/www/html/WEBSITE GENERAL INFO:ro"
      - ./laravel/storage:/var/www/html/storage
      - ./laravel/bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "php", "artisan", "--version" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # NGINX (Web Server para Laravel)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: bweek_nginx
    restart: unless-stopped
    networks:
      - frontend_net
    ports:
      - "80:80"
    volumes:
      - ./laravel:/var/www/html:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - laravel
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/up" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # N8N (Automation + MCP)
  # NO expuesto públicamente
  # ==========================================
  n8n:
    image: n8nio/n8n:latest
    container_name: bweek_n8n
    restart: unless-stopped
    networks:
      - backend_ai_net # Solo red interna
    environment:
      # Database
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_DB:-n8n_db}
      - DB_POSTGRESDB_USER=${DB_USERNAME:-bweek_admin}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-changeme_secure_password}

      # n8n Config
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=${N8N_HOST:-n8n}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://n8n:5678
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false

      # Security
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme_n8n_password}

      # Timezone
      - GENERIC_TIMEZONE=Europe/Madrid
      - TZ=Europe/Madrid
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows
      - ./n8n/credentials:/home/node/.n8n/credentials
      - ./n8n/mcp-servers:/mcp-servers:ro
    depends_on:
      postgres:
        condition: service_healthy
      laravel:
        condition: service_healthy
    ports:
      - "5678:5678"
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5678/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # NGINX PROXY MANAGER
  # SSL automático + Proxy inverso
  # ==========================================
  proxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: bweek_proxy
    restart: unless-stopped
    networks:
      - frontend_net
    ports:
      - "443:443" # HTTPS
      - "81:81" # Admin panel
    environment:
      - DB_SQLITE_FILE=/data/database.sqlite
      - DISABLE_IPV6=true
    volumes:
      - ./nginx-proxy-manager/data:/data
      - ./nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    depends_on:
      - nginx
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:81" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # QUEUE WORKER (Laravel)
  # Procesa trabajos en background
  # ==========================================
  queue:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: bweek_queue
    restart: unless-stopped
    networks:
      - backend_ai_net
    environment:
      - CONTAINER_ROLE=queue
    env_file:
      - .env
    volumes:
      - ./laravel:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600

  # ==========================================
  # SCHEDULER (Laravel)
  # Ejecuta tareas programadas
  # ==========================================
  scheduler:
    build:
      context: ./laravel
      dockerfile: Dockerfile
    container_name: bweek_scheduler
    restart: unless-stopped
    networks:
      - backend_ai_net
    environment:
      - CONTAINER_ROLE=scheduler
    env_file:
      - .env
    volumes:
      - ./laravel:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction &
        sleep 60
      done"
